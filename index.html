<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESET_LIST // OPERATING_SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=VT323&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-amber: #ffb000;
            --neon-pink: #ff00c1;
            --neon-cyan: #00fff9;
            --neon-green: #33ff33;
            --bg-dark: #050505;
            --glass: rgba(255, 176, 0, 0.03);
            --radius-xl: 2.5rem;
        }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: var(--bg-dark); 
            color: #e0e0e0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Moving Grid Background */
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255, 176, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 176, 0, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            transform: perspective(500px) rotateX(60deg) translateY(-100px);
            transform-origin: top;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            from { background-position: 0 0; }
            to { background-position: 0 500px; }
        }

        /* CRT Glitch Overlays */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            z-index: 100;
            pointer-events: none;
        }

        .aesthetic-card {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 176, 0, 0.15);
            border-radius: var(--radius-xl);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .aesthetic-card:hover {
            border-color: var(--neon-amber);
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(255, 176, 0, 0.1);
        }

        .timer-font {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            letter-spacing: -0.05em;
        }

        .glitch-heading {
            font-family: 'VT323', monospace;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            background: linear-gradient(to right, var(--neon-amber), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 5px rgba(255, 176, 0, 0.3));
        }

        .retro-btn {
            background: rgba(255, 176, 0, 0.05);
            border: 1px solid var(--neon-amber);
            color: var(--neon-amber);
            border-radius: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
        }

        .retro-btn:hover {
            background: var(--neon-amber);
            color: black;
            box-shadow: 0 0 20px var(--neon-amber);
        }

        .status-pill {
            padding: 2px 12px;
            border-radius: 999px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .animate-enter {
            animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .modal-blur {
            backdrop-filter: blur(8px);
            background: rgba(0,0,0,0.8);
        }

        .modal-animate-out {
            animation: powerOff 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes powerOff {
            0% { transform: scale(1); opacity: 1; filter: brightness(1); }
            40% { transform: scale(1.02, 0.01); opacity: 0.8; }
            100% { transform: scale(0, 0); opacity: 0; filter: brightness(5); }
        }

        .input-dark {
            background: rgba(0,0,0,0.4) !important;
            border: 1px solid rgba(255, 176, 0, 0.2) !important;
            border-radius: 1rem !important;
            color: white !important;
        }

        .input-dark:focus {
            border-color: var(--neon-amber) !important;
            box-shadow: 0 0 15px rgba(255, 176, 0, 0.1);
        }
    </style>
</head>
<body class="p-6">
    <div class="grid-bg"></div>

    <div id="app" class="max-w-5xl mx-auto py-12 px-4">
        <header class="flex flex-col md:flex-row items-end justify-between gap-8 mb-16">
            <div>
                <h1 class="text-6xl md:text-7xl font-bold glitch-heading tracking-tighter">RESET_LIST</h1>
                <p class="text-xs font-medium opacity-40 mt-4 tracking-widest uppercase italic">Advanced cooldown monitoring interface</p>
            </div>
            
            <button id="add-btn" class="retro-btn px-10 py-4 group">
                <span class="group-hover:mr-2 transition-all inline-block">+</span> 
                Initialize New Entity
            </button>
        </header>

        <div id="stats-container" class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-16"></div>
        <div id="accounts-list" class="space-y-6"></div>
    </div>

    <!-- Modals -->
    <div id="add-modal" class="fixed inset-0 z-50 flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 modal-blur opacity-0 transition-opacity duration-300" id="add-modal-overlay"></div>
        <div id="add-modal-content" class="relative w-full max-w-lg aesthetic-card p-10 bg-[#0a0a0a] border-2 border-amber-500/30">
            <h2 id="modal-heading" class="text-3xl font-bold mb-8 glitch-heading">DATA_INPUT</h2>
            <input type="hidden" id="edit-id">
            <div class="space-y-8">
                <div>
                    <label class="text-[10px] font-black uppercase tracking-[0.2em] mb-3 block text-amber-500/50">Entity Identifier</label>
                    <input id="new-name" placeholder="Enter name..." class="w-full py-4 px-6 input-dark focus:outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase tracking-[0.2em] mb-3 block text-amber-500/50">Cycle Duration (Hours)</label>
                    <input id="new-duration" type="number" step="0.5" value="24" class="w-full py-4 px-6 input-dark focus:outline-none">
                </div>
                <div class="flex gap-4 pt-4">
                    <button id="add-modal-abort" class="flex-1 py-4 text-xs font-bold uppercase tracking-widest text-white/40 hover:text-white transition-colors">Cancel</button>
                    <button id="modal-save-btn" class="flex-1 py-4 retro-btn">OK</button>
                </div>
            </div>
        </div>
    </div>

    <div id="confirm-modal" class="fixed inset-0 z-[60] flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 modal-blur" id="confirm-modal-overlay"></div>
        <div id="confirm-modal-content" class="relative w-full max-w-sm aesthetic-card p-10 border-red-500/40 bg-[#0a0505]">
            <div class="text-center">
                <i id="modal-icon" data-lucide="alert-octagon" class="w-16 h-16 text-red-500 mx-auto mb-6"></i>
                <h3 id="confirm-modal-title" class="text-2xl font-bold mb-4 tracking-tighter">CONFIRM_PURGE</h3>
                <p id="confirm-modal-desc" class="text-sm opacity-50 mb-10 leading-relaxed font-medium">Warning: This operation will permanently remove the entity from active memory.</p>
            </div>
            <div class="flex flex-col gap-4">
                <button id="modal-confirm-btn" class="w-full py-4 bg-red-500 text-black font-black uppercase tracking-widest hover:brightness-125 transition-all">Confirm</button>
                <button id="confirm-modal-cancel" class="w-full py-3 text-[10px] font-bold uppercase tracking-widest opacity-40 hover:opacity-100 transition-opacity">Abort</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'aesthetic-reset-v2';
        let accounts = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let filterStatus = 'all';

        const addBtn = document.getElementById('add-btn');
        const addModal = document.getElementById('add-modal');
        const addModalContent = document.getElementById('add-modal-content');
        const addModalOverlay = document.getElementById('add-modal-overlay');
        const modalSaveBtn = document.getElementById('modal-save-btn');
        const confirmModal = document.getElementById('confirm-modal');
        const confirmModalContent = document.getElementById('confirm-modal-content');
        const confirmModalOverlay = document.getElementById('confirm-modal-overlay');

        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(accounts));
            renderList();
        }

        function setFilter(filter) {
            filterStatus = (filterStatus === filter) ? 'all' : filter;
            renderList();
        }

        function openModal(modalEl, contentEl, overlayEl) {
            modalEl.classList.remove('hidden');
            setTimeout(() => overlayEl.style.opacity = '1', 10);
            contentEl.classList.remove('modal-animate-out');
            contentEl.classList.add('animate-enter');
        }

        function closeModal(modalEl, contentEl, overlayEl) {
            overlayEl.style.opacity = '0';
            contentEl.classList.remove('animate-enter');
            contentEl.classList.add('modal-animate-out');
            setTimeout(() => modalEl.classList.add('hidden'), 400);
        }

        function toggleAddModal(editMode = false, accountId = null) {
            if (editMode && accountId) {
                const acc = accounts.find(a => a.id === accountId);
                document.getElementById('modal-heading').innerText = "EDIT_ENTITY";
                document.getElementById('edit-id').value = accountId;
                document.getElementById('new-name').value = acc.name;
                document.getElementById('new-duration').value = acc.durationMs / 3600000;
            } else {
                document.getElementById('modal-heading').innerText = "DATA_INPUT";
                document.getElementById('edit-id').value = "";
                document.getElementById('new-name').value = "";
                document.getElementById('new-duration').value = "24";
            }
            if (addModal.classList.contains('hidden')) openModal(addModal, addModalContent, addModalOverlay);
            else closeModal(addModal, addModalContent, addModalOverlay);
        }

        function saveNewAccount() {
            const name = document.getElementById('new-name').value;
            const durationInput = parseFloat(document.getElementById('new-duration').value);
            const editId = document.getElementById('edit-id').value;
            
            if (!name || isNaN(durationInput)) return;

            const newDurationMs = durationInput * 60 * 60 * 1000;
            const now = Date.now();

            if (editId) {
                accounts = accounts.map(acc => {
                    if (acc.id === editId) {
                        let updatedResetAt = acc.resetAt;
                        // If timer is running, adjust resetAt relative to the NEW duration
                        if (acc.resetAt && acc.resetAt > now) {
                            const oldDuration = acc.durationMs;
                            const remainingMs = acc.resetAt - now;
                            const progress = remainingMs / oldDuration;
                            updatedResetAt = now + (newDurationMs * progress);
                        }
                        return { ...acc, name: name, durationMs: newDurationMs, resetAt: updatedResetAt };
                    }
                    return acc;
                });
            } else {
                accounts.unshift({
                    id: 'ID_' + Math.random().toString(36).substr(2, 5).toUpperCase(),
                    name, durationMs: newDurationMs, resetAt: null, profileImage: null
                });
            }
            toggleAddModal();
            saveToStorage();
        }

        function handleImageUpload(id, event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    accounts = accounts.map(acc => acc.id === id ? { ...acc, profileImage: e.target.result } : acc);
                    saveToStorage();
                };
                reader.readAsDataURL(file);
            }
        }

        function openConfirmModal(type, id) {
            const btn = document.getElementById('modal-confirm-btn');
            const title = document.getElementById('confirm-modal-title');
            if (type === 'delete') {
                title.innerText = "PURGE_ENTITY";
                btn.className = "w-full py-4 bg-red-500 text-black font-black uppercase tracking-widest hover:brightness-125 transition-all";
                btn.onclick = () => { accounts = accounts.filter(a => a.id !== id); saveToStorage(); closeConfirmModal(); };
            } else {
                title.innerText = "RESET_TIMER";
                btn.className = "w-full py-4 bg-amber-500 text-black font-black uppercase tracking-widest hover:brightness-125 transition-all";
                btn.onclick = () => { accounts = accounts.map(a => a.id === id ? {...a, resetAt: null} : a); saveToStorage(); closeConfirmModal(); };
            }
            openModal(confirmModal, confirmModalContent, confirmModalOverlay);
        }

        function closeConfirmModal() { closeModal(confirmModal, confirmModalContent, confirmModalOverlay); }

        function formatTime(resetAt) {
            const now = Date.now();
            if (!resetAt || resetAt <= now) return "00:00:00";
            const diff = resetAt - now;
            const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function renderList() {
            const list = document.getElementById('accounts-list');
            const stats = document.getElementById('stats-container');
            const now = Date.now();
            const ready = accounts.filter(a => !a.resetAt || a.resetAt <= now).length;

            stats.innerHTML = `
                <div onclick="setFilter('all')" class="aesthetic-card p-6 cursor-pointer ${filterStatus === 'all' ? 'border-amber-500 bg-amber-500/10' : ''}">
                    <div class="text-[10px] font-black opacity-30 tracking-[0.3em] mb-1">TOTAL_UNITS</div>
                    <div class="text-4xl font-bold tracking-tighter">${accounts.length}</div>
                </div>
                <div onclick="setFilter('ready')" class="aesthetic-card p-6 cursor-pointer ${filterStatus === 'ready' ? 'border-green-500 bg-green-500/10' : ''}">
                    <div class="text-[10px] font-black opacity-30 tracking-[0.3em] mb-1">UNITS_READY</div>
                    <div class="text-4xl font-bold text-green-400 tracking-tighter">${ready}</div>
                </div>
                <div onclick="setFilter('cooling')" class="aesthetic-card p-6 cursor-pointer ${filterStatus === 'cooling' ? 'border-pink-500 bg-pink-500/10' : ''}">
                    <div class="text-[10px] font-black opacity-30 tracking-[0.3em] mb-1">COOLING_DOWN</div>
                    <div class="text-4xl font-bold text-pink-500 tracking-tighter">${accounts.length - ready}</div>
                </div>
            `;

            let filtered = accounts;
            if (filterStatus === 'ready') filtered = accounts.filter(a => !a.resetAt || a.resetAt <= now);
            if (filterStatus === 'cooling') filtered = accounts.filter(a => a.resetAt && a.resetAt > now);

            list.innerHTML = filtered.map((acc, i) => {
                const isReady = !acc.resetAt || acc.resetAt <= now;
                return `
                    <div class="aesthetic-card p-6 flex flex-col md:flex-row items-center gap-8 animate-enter" style="animation-delay: ${i * 0.1}s">
                        <div class="flex items-center gap-6 w-full md:w-72">
                            <label class="w-20 h-20 bg-black/40 border border-white/10 rounded-3xl shrink-0 overflow-hidden cursor-pointer relative group">
                                ${acc.profileImage ? `<img src="${acc.profileImage}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center opacity-20"><i data-lucide="user"></i></div>`}
                                <div class="absolute inset-0 bg-amber-500/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center"><i data-lucide="camera" class="text-black"></i></div>
                                <input type="file" class="hidden" onchange="handleImageUpload('${acc.id}', event)">
                            </label>
                            <div class="min-w-0">
                                <h3 class="text-2xl font-bold tracking-tighter truncate uppercase">${acc.name}</h3>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="status-pill ${isReady ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-pink-500/10 text-pink-400 border border-pink-500/20'}">
                                        ${isReady ? 'Ready' : 'Cooling'}
                                    </span>
                                    <span class="text-[10px] font-bold opacity-30 tracking-widest">${acc.id}</span>
                                </div>
                            </div>
                        </div>

                        <div class="flex-1 flex flex-col items-center">
                            <div class="timer-font text-5xl md:text-6xl tabular-nums tracking-tighter ${isReady ? 'text-green-400/20' : 'text-white'}" data-id="${acc.id}">
                                ${formatTime(acc.resetAt)}
                            </div>
                            <div class="text-[10px] font-black tracking-[0.5em] opacity-20 uppercase mt-2">Duration // ${acc.durationMs/3600000}H</div>
                        </div>

                        <div class="flex items-center gap-4">
                            ${isReady ? 
                                `<button onclick="startTimer('${acc.id}')" class="retro-btn px-8 py-3">Initialize</button>` : 
                                `<button onclick="openConfirmModal('reset', '${acc.id}')" class="px-6 py-2 border border-white/10 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-white/5">Reset</button>`
                            }
                            <div class="flex gap-2 border-l border-white/10 pl-4">
                                <button onclick="toggleAddModal(true, '${acc.id}')" class="p-2 opacity-30 hover:opacity-100 hover:text-amber-500 transition-all"><i data-lucide="edit-3"></i></button>
                                <button onclick="openConfirmModal('delete', '${acc.id}')" class="p-2 opacity-30 hover:opacity-100 hover:text-red-500 transition-all"><i data-lucide="trash-2"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function startTimer(id) {
            const acc = accounts.find(a => a.id === id);
            if (acc) {
                accounts = accounts.map(a => a.id === id ? {...a, resetAt: Date.now() + a.durationMs} : a);
                saveToStorage();
            }
        }

        addBtn.addEventListener('click', () => toggleAddModal());
        document.getElementById('add-modal-abort').addEventListener('click', () => toggleAddModal());
        modalSaveBtn.addEventListener('click', saveNewAccount);
        document.getElementById('confirm-modal-cancel').addEventListener('click', closeConfirmModal);

        setInterval(() => {
            document.querySelectorAll('.timer-font').forEach(el => {
                const id = el.getAttribute('data-id');
                const acc = accounts.find(a => a.id === id);
                if (acc) {
                    const time = formatTime(acc.resetAt);
                    if (el.innerText !== time) el.innerText = time;
                }
            });
        }, 1000);

        window.onload = renderList;
    </script>
</body>
</html>
